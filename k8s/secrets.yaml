apiVersion: v1
kind: Secret
metadata:
  name: forestroots-secrets
  namespace: forestroots
type: Opaque
stringData:
  POSTGRES_PASSWORD: forestroots_password
  JWT_SECRET: replace-with-a-long-random-secret
  DATABASE_URL_USERS: postgres://forestroots:forestroots_password@postgres:5432/forestroots_users
  DATABASE_URL_PRODUCTS: postgres://forestroots:forestroots_password@postgres:5432/forestroots_products
  DATABASE_URL_ORDERS: postgres://forestroots:forestroots_password@postgres:5432/forestroots_orders
  DATABASE_URL_NOTIFICATIONS: postgres://forestroots:forestroots_password@postgres:5432/forestroots_notifications
