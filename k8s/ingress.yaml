apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forestroots-ingress
  namespace: forestroots
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  rules:
    - host: api.forestroots.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

