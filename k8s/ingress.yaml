apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forestroots-ingress
  namespace: forestroots
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  rules:
    - host: api.forestroots.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forestroots-ingress
  namespace: forestroots
spec:
  ingressClassName: nginx
  rules:
  - host: forestroots.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8080
