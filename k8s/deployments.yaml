apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: forestroots
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/forestroots-api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: forestroots-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: forestroots
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/your-org/forestroots-user-service:latest
          ports:
            - containerPort: 4101
          env:
            - name: PORT
              value: "4101"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: forestroots-secrets
                  key: DATABASE_URL_USERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forestroots-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4101
            initialDelaySeconds: 10
            periodSeconds: 10
---
